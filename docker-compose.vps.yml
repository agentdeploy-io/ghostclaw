services:
  caddy:
    ports:
      - "80:80"
      - "443:443"
    restart: always

  postgres:
    restart: always

  ironclaw:
    restart: always
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  camoufox-tool:
    restart: always
    security_opt:
      - no-new-privileges:true

  agent-sandbox:
    restart: always

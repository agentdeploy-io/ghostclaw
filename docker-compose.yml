name: ghostclaw

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 15s
      timeout: 5s
      retries: 20

  camoufox-tool:
    build:
      context: .
      dockerfile: docker/Dockerfile.camoufox-tool
    restart: unless-stopped
    environment:
      CAMOUFOX_TOOL_PORT: 8788
      CAMOUFOX_ARTIFACT_DIR: /data/artifacts/camoufox
      CAMOUFOX_HEADLESS: ${CAMOUFOX_HEADLESS:-true}
      CAMOUFOX_DEFAULT_TIMEOUT_MS: ${CAMOUFOX_DEFAULT_TIMEOUT_MS:-25000}
      BROWSER_CHALLENGE_KEYWORDS: ${BROWSER_CHALLENGE_KEYWORDS}
    volumes:
      - ./data/artifacts:/data/artifacts
    expose:
      - "8788"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8788/healthz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))\""]
      interval: 20s
      timeout: 5s
      retries: 12

  camoufox-mcp:
    build:
      context: .
      dockerfile: docker/Dockerfile.camoufox-mcp
    restart: unless-stopped
    environment:
      CAMOUFOX_MCP_PORT: 8790
      CAMOUFOX_TOOL_BASE_URL: http://camoufox-tool:8788
    depends_on:
      camoufox-tool:
        condition: service_healthy
    expose:
      - "8790"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8790/healthz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))\""]
      interval: 20s
      timeout: 5s
      retries: 12

  mentor-mcp:
    build:
      context: .
      dockerfile: docker/Dockerfile.mentor-mcp
    restart: unless-stopped
    environment:
      MENTOR_MCP_PORT: 8791
      MENTOR_NAME: ${MENTOR_NAME:-Ghostclaw Mentor}
      MENTOR_PERSONA_FILE: ${MENTOR_PERSONA_FILE:-/mentor/persona.md}
      MENTOR_MEMORY_FILE: ${MENTOR_MEMORY_FILE:-/data/mentor/memory.json}
      MENTOR_MEMORY_WINDOW: ${MENTOR_MEMORY_WINDOW:-14}
      MENTOR_LLM_BASE_URL: ${MENTOR_LLM_BASE_URL:-https://llm.chutes.ai/v1}
      MENTOR_LLM_API_KEY: ${MENTOR_LLM_API_KEY:-}
      MENTOR_LLM_MODEL: ${MENTOR_LLM_MODEL:-MiniMaxAI/MiniMax-M2.5-TEE}
      ENABLE_MENTOR_VOICE: ${ENABLE_MENTOR_VOICE:-false}
      MENTOR_VOICE_API_BASE_URL: ${MENTOR_VOICE_API_BASE_URL:-https://llm.chutes.ai/v1}
      MENTOR_VOICE_API_KEY: ${MENTOR_VOICE_API_KEY:-}
      MENTOR_CHUTES_VOICE_MODE: ${MENTOR_CHUTES_VOICE_MODE:-run_api}
      MENTOR_CHUTES_RUN_ENDPOINT: ${MENTOR_CHUTES_RUN_ENDPOINT:-https://llm.chutes.ai/v1/run}
      MENTOR_CHUTES_WHISPER_MODEL: ${MENTOR_CHUTES_WHISPER_MODEL:-openai/whisper-large-v3-turbo}
      MENTOR_CHUTES_CSM_MODEL: ${MENTOR_CHUTES_CSM_MODEL:-sesame/csm-1b}
      MENTOR_CHUTES_KOKORO_MODEL: ${MENTOR_CHUTES_KOKORO_MODEL:-hexgrad/Kokoro-82M}
      MENTOR_CHUTES_ENABLE_KOKORO_FALLBACK: ${MENTOR_CHUTES_ENABLE_KOKORO_FALLBACK:-true}
      MENTOR_VOICE_SAMPLE_PATH: ${MENTOR_VOICE_SAMPLE_PATH:-/data/mentor/voice_sample.mp3}
      MENTOR_VOICE_CONTEXT_PATH: ${MENTOR_VOICE_CONTEXT_PATH:-/data/mentor/voice_context.txt}
      MENTOR_VOICE_AUTO_TRANSCRIBE: ${MENTOR_VOICE_AUTO_TRANSCRIBE:-true}
      MENTOR_ARTIFACT_DIR: /data/artifacts/mentor
    volumes:
      - ./data/artifacts:/data/artifacts
      - ./data/mentor:/data/mentor
      - ./mentor:/mentor:ro
    expose:
      - "8791"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8791/healthz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))\""]
      interval: 20s
      timeout: 5s
      retries: 12

  ironclaw:
    build:
      context: .
      dockerfile: docker/Dockerfile.ironclaw
      args:
        IRONCLAW_GIT_URL: ${IRONCLAW_GIT_URL}
        IRONCLAW_GIT_REF: ${IRONCLAW_GIT_REF}
    restart: unless-stopped
    command: ["run", "--no-onboard"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      CAMOUFOX_TOOL_BASE_URL: http://camoufox-tool:8788
      SECRETS_MASTER_KEY: ${SECRETS_MASTER_KEY}
      LLM_BACKEND: openai_compatible
      LLM_BASE_URL: ${MAIN_LLM_BASE_URL}
      LLM_API_KEY: ${MAIN_LLM_API_KEY}
      LLM_MODEL: ${MAIN_LLM_MODEL}
      CLI_ENABLED: "false"
      GATEWAY_ENABLED: "true"
      GATEWAY_HOST: 0.0.0.0
      GATEWAY_PORT: "8080"
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: "8090"
      HTTP_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      camoufox-tool:
        condition: service_healthy
      camoufox-mcp:
        condition: service_healthy
      mentor-mcp:
        condition: service_healthy
    volumes:
      - ironclaw_home:/home/ironclaw/.ironclaw
      - ./data/artifacts:/data/artifacts
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'exec 3<>/dev/tcp/127.0.0.1/8080'"]
      interval: 20s
      timeout: 6s
      retries: 15

  agent-sandbox:
    build:
      context: .
      dockerfile: docker/Dockerfile.sandbox
    restart: unless-stopped
    working_dir: /workspace
    command: ["sleep", "infinity"]
    volumes:
      - ./:/workspace
      - ./data/artifacts:/data/artifacts

  caddy:
    image: caddy:2.8.4-alpine
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      ironclaw:
        condition: service_healthy
    volumes:
      - ./infra/Caddyfile.official:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  ironclaw_home:
  caddy_data:
  caddy_config:
